<!-- 1. FAVICON (Add this in <head>) -->
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/logo.webp">

<!-- 2. OPEN GRAPH TAGS (For Facebook, LinkedIn, WhatsApp sharing) -->
<!-- Replace content values with actual page data -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://skaiconnect.com/">
<meta property="og:title" content="SkaiConnect | Cloud Call Centers Made Simple">
<meta property="og:description"
    content="SkaiConnect helps businesses design, migrate, and operate cloud call centers for voice, chat, email, AI automation, and telecom support.">
<meta property="og:image" content="https://skaiconnect.com/assets/logo.webp">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="SkaiConnect">
<meta property="og:locale" content="en_US">

<!-- 3. TWITTER CARD TAGS (For Twitter sharing) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:url" content="https://skaiconnect.com/">
<meta name="twitter:title" content="SkaiConnect | Cloud Call Centers Made Simple">
<meta name="twitter:description"
    content="SkaiConnect helps businesses design, migrate, and operate cloud call centers for voice, chat, email, AI automation, and telecom support.">
<meta name="twitter:image" content="https://skaiconnect.com/assets/logo.webp">

<!-- 4. CANONICAL URL (Prevent duplicate content) -->
<link rel="canonical" href="https://skaiconnect.com/">

<!-- 5. GOOGLE ANALYTICS (Replace G-XXXXXXXXXX with your tracking ID) -->
<!-- Get your tracking ID from: https://analytics.google.com -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
</script>

<!-- HOW TO USE THIS FILE -->
<!-- ============================================ -->

<!-- 
1. FAVICON:
   - Copy favicon link tags to ALL pages in <head> section
   - favicon.svg already created in root folder

2. OPEN GRAPH & TWITTER CARDS:
   - Copy these tags to ALL pages in <head> section
   - Change og:url, og:title, og:description for each page
   - Change og:image if you have page-specific images

3. GOOGLE ANALYTICS:
   - Sign up at https://analytics.google.com
   - Create a property for skaiconnect.com
   - Get your tracking ID (starts with G-XXXXXXXXXX)
   - Replace G-XXXXXXXXXX with your actual ID
   - Add to ALL pages in <head> section

4. SCHEMA.ORG:
   - Add Organization schema to homepage (index.html) before </body>
   - Add Article schema to blog posts before </body>
   - Add Service schema to service pages before </body>
   - Update values with actual data

5. CANONICAL URL:
   - Add to ALL pages in <head> section
   - Change href to actual page URL
-->
